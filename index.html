<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew & Audit — Your Business, Clearly.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg0: #060300;
  --bg1: #100800;
  --bg2: #1C0D00;
  --bg3: #281300;
  --bg4: #341900;
  --gold: #C8921E;
  --gold-b: #D4A843;
  --gold-l: #E0BE74;
  --gold-glow: rgba(200,146,30,0.11);
  --cream: #F0DDB8;
  --cream-d: #9A8060;
  --cream-f: #4A3020;
  --border: rgba(200,146,30,0.16);
  --border-hi: rgba(200,146,30,0.44);
  --ff-d: 'Cormorant Garamond', Georgia, serif;
  --ff-b: 'Outfit', system-ui, sans-serif;
  --ff-s: 'Lora', Georgia, serif;
  --r: 14px;
  --r-lg: 22px;
  --ease: cubic-bezier(.4,0,.2,1);
}
 
html, body { height: 100%; overflow: hidden; background: var(--bg0); color: var(--cream); font-family: var(--ff-b); font-size: 15px; line-height: 1.6; }
 
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 256px; opacity: 0.55;
}
 
/* ── WELCOME ── */
#welcome {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem;
  background: radial-gradient(ellipse 80% 70% at 50% 55%, #1F0900 0%, var(--bg0) 72%);
  transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
}
#welcome.out { opacity: 0; transform: translateY(-22px); pointer-events: none; }
 
.steam { display: flex; gap: 8px; justify-content: center; margin-bottom: 4px; height: 34px; align-items: flex-end; }
.sl { width: 3px; border-radius: 3px; background: linear-gradient(to top, var(--gold), transparent); transform-origin: bottom center; animation: sr 2.1s ease-in-out infinite; }
.sl:nth-child(1){height:14px;animation-delay:0s} .sl:nth-child(2){height:22px;animation-delay:.38s} .sl:nth-child(3){height:17px;animation-delay:.76s}
@keyframes sr { 0%{transform:scaleY(1) translateY(0);opacity:.75} 55%{transform:scaleY(1.18) translateY(-9px);opacity:1} 100%{transform:scaleY(.65) translateY(-20px);opacity:0} }
 
.cup { display: block; width: 72px; height: 58px; margin: 0 auto 2.2rem; }
 
.logo { font-family: var(--ff-d); font-size: 4rem; font-weight: 300; line-height: 1; color: var(--gold-b); letter-spacing: 0.01em; margin-bottom: 0.45rem; text-align: center; }
.logo em { font-style: italic; color: var(--cream-d); font-weight: 300; }
.tagline { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase; color: var(--cream-d); margin-bottom: 3.5rem; text-align: center; }
.rule { width: 48px; height: 1px; background: var(--border-hi); margin: 0 auto 2.75rem; }
 
.klabel { display: block; font-size: 0.67rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cream-d); margin-bottom: 0.65rem; text-align: center; }
.kinput {
  display: block; width: 316px; max-width: calc(100vw - 2.5rem);
  padding: 0.85rem 1.2rem; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--cream); font-family: var(--ff-b);
  font-size: 0.95rem; text-align: center;
  transition: border-color .2s, background .2s; margin: 0 auto 1.4rem;
}
.kinput:focus { outline: none; border-color: var(--border-hi); background: var(--bg3); }
.kinput::placeholder { color: var(--cream-f); }
 
.begin {
  display: block; margin: 0 auto; padding: 0.92rem 2.9rem;
  background: linear-gradient(135deg, #B8820E, var(--gold-b) 55%, var(--gold-l));
  border: none; border-radius: var(--r); color: #120700;
  font-family: var(--ff-b); font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.13em; text-transform: uppercase; cursor: pointer;
  transition: transform .15s, box-shadow .25s;
}
.begin:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(200,146,30,.36); }
.begin:active { transform: translateY(0); }
 
.wfoot { margin-top: 2rem; font-size: 0.69rem; color: var(--cream-f); text-align: center; line-height: 1.85; }
 
/* ── CHAT ── */
#chat {
  position: fixed; inset: 0; z-index: 5;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.55s var(--ease);
}
#chat.in { opacity: 1; pointer-events: all; }
 
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.88rem 1.5rem; flex-shrink: 0;
  background: var(--bg1); border-bottom: 1px solid var(--border);
}
.hdr-logo { font-family: var(--ff-d); font-size: 1.52rem; font-weight: 400; color: var(--gold-b); letter-spacing: .02em; }
.stage-tag { font-size: 0.67rem; font-weight: 400; letter-spacing: .15em; text-transform: uppercase; color: var(--cream-d); padding: .28rem .85rem; border: 1px solid var(--border); border-radius: 20px; }
 
#msgs {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1.2rem;
  background: var(--bg1);
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-track { background: transparent; }
#msgs::-webkit-scrollbar-thumb { background: var(--cream-f); border-radius: 2px; }
 
.msg { max-width: 78%; animation: mf .28s ease-out both; }
.msg.sage { align-self: flex-start; }
.msg.user { align-self: flex-end; }
@keyframes mf { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
 
.msg-who { font-size: .62rem; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--cream-d); margin-bottom: .36rem; }
.msg.user .msg-who { text-align: right; }
 
.msg-bub { padding: 1rem 1.3rem; border-radius: var(--r-lg); font-size: .88rem; line-height: 1.76; word-break: break-word; white-space: pre-wrap; }
.msg.sage .msg-bub { background: var(--bg3); border: 1px solid var(--border); color: var(--cream); font-family: var(--ff-s); border-bottom-left-radius: 4px; }
.msg.user .msg-bub { background: linear-gradient(135deg, #B8820E, var(--gold-b)); color: #120700; font-family: var(--ff-b); font-weight: 500; font-size: .86rem; border-bottom-right-radius: 4px; }
.msg.sage .msg-bub { white-space: normal; }
.msg.sage .msg-bub table { border-collapse: collapse; width: 100%; margin: 0.8rem 0; font-size: 0.8rem; }
.msg.sage .msg-bub th { background: rgba(200,146,30,0.18); color: var(--gold-l); padding: 0.5rem 0.75rem; border: 1px solid var(--border-hi); text-align: left; font-family: var(--ff-b); font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; }
.msg.sage .msg-bub td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); color: var(--cream); vertical-align: top; line-height: 1.5; }
.msg.sage .msg-bub tr:nth-child(even) td { background: rgba(200,146,30,0.04); }
.msg.sage .msg-bub strong { color: var(--gold-l); font-weight: 600; }
.msg.sage .msg-bub p { margin-bottom: 0.6rem; }
.msg.sage .msg-bub ul, .msg.sage .msg-bub ol { padding-left: 1.2rem; margin-bottom: 0.6rem; }
.msg.sage .msg-bub li { margin-bottom: 0.25rem; }
 
.typing { align-self: flex-start; display: flex; gap: 5px; padding: .78rem 1.1rem; border-radius: var(--r-lg); background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; animation: mf .28s ease-out both; }
.td { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: tp 1.3s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.18s} .td:nth-child(3){animation-delay:.36s}
@keyframes tp { 0%,80%,100%{transform:scale(.65);opacity:.3} 40%{transform:scale(1);opacity:1} }
 
.ack { align-self: center; font-size: .68rem; color: var(--cream-d); font-style: italic; animation: mf .28s ease-out both; }
 
#act { padding: .85rem 1.25rem; background: var(--bg2); border-top: 1px solid var(--border); display: none; gap: .75rem; flex-wrap: wrap; flex-shrink: 0; align-items: center; }
#act.show { display: flex; }
 
.abtn { padding: .62rem 1.3rem; border-radius: var(--r); font-family: var(--ff-b); font-size: .8rem; font-weight: 500; cursor: pointer; transition: all .15s; border: 1px solid; line-height: 1; }
.abtn.prim { background: linear-gradient(135deg, #B8820E, var(--gold-b)); border-color: transparent; color: #120700; font-weight: 600; }
.abtn.prim:hover { box-shadow: 0 4px 18px rgba(200,146,30,.4); transform: translateY(-1px); }
.abtn.sec { background: transparent; border-color: var(--border-hi); color: var(--cream-d); }
.abtn.sec:hover { background: var(--gold-glow); color: var(--cream); }
 
.brewing { align-self: center; display: flex; flex-direction: column; align-items: center; gap: .7rem; padding: 1rem 0; animation: mf .3s ease-out both; }
.bbars { display: flex; gap: 4px; align-items: flex-end; height: 26px; }
.bbar { width: 4px; border-radius: 3px; background: linear-gradient(to top, var(--gold), var(--gold-l)); animation: bb .85s ease-in-out infinite alternate; }
.bbar:nth-child(1){height:10px;animation-delay:0s} .bbar:nth-child(2){height:18px;animation-delay:.1s} .bbar:nth-child(3){height:24px;animation-delay:.2s} .bbar:nth-child(4){height:16px;animation-delay:.3s} .bbar:nth-child(5){height:9px;animation-delay:.4s}
@keyframes bb { from{transform:scaleY(.55);opacity:.45} to{transform:scaleY(1);opacity:1} }
.btxt { font-family: var(--ff-d); font-size: 1.1rem; font-style: italic; color: var(--gold-b); }
.bsub { font-size: .69rem; color: var(--cream-d); letter-spacing: .08em; }
 
#inp { display: flex; align-items: flex-end; gap: .75rem; padding: 1rem 1.25rem; background: var(--bg1); border-top: 1px solid var(--border); flex-shrink: 0; }
#inp.hidden { display: none; }
 
#ui { flex: 1; padding: .8rem 1.1rem; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); color: var(--cream); font-family: var(--ff-b); font-size: .88rem; line-height: 1.55; resize: none; min-height: 46px; max-height: 130px; overflow-y: auto; transition: border-color .2s, background .2s; }
#ui:focus { outline: none; border-color: var(--border-hi); background: var(--bg4); }
#ui::placeholder { color: var(--cream-f); }
 
.sndbtn { width: 44px; height: 44px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, transform .15s; }
.sndbtn:hover { background: var(--gold-b); transform: scale(1.06); }
.sndbtn:disabled { opacity: .32; cursor: not-allowed; transform: none; }
.sndbtn svg { fill: none; stroke: #120700; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
 
.powered { text-align: center; padding: 0.45rem; font-size: 0.62rem; color: var(--cream-f); letter-spacing: 0.08em; background: var(--bg1); border-top: 1px solid var(--border); flex-shrink: 0; }
 
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #2E0000; border: 1px solid #6A0000; color: #FFA0A0; padding: .65rem 1.4rem; border-radius: var(--r); font-size: .79rem; z-index: 9999; white-space: nowrap; max-width: calc(100vw - 2rem); animation: ti .3s ease-out; }
@keyframes ti { from{opacity:0;bottom:.5rem} to{opacity:1;bottom:1.5rem} }
 
@media(max-width:600px) { .msg{max-width:91%} .logo{font-size:2.9rem} .kinput{width:260px} }
</style>
 <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
 
<!-- WELCOME -->
<div id="welcome">
  <div class="steam">
    <div class="sl"></div><div class="sl"></div><div class="sl"></div>
  </div>
  <svg class="cup" viewBox="0 0 72 58" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9 13h54l-7 36H16L9 13z" stroke="#C8921E" stroke-width="1.8" fill="rgba(200,146,30,0.07)" stroke-linejoin="round"/>
    <path d="M52 21h7a9 9 0 0 1 0 18h-7" stroke="#C8921E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M5 51h62" stroke="#C8921E" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>
    <path d="M11 51 Q14 55 36 55 Q58 55 61 51" stroke="#C8921E" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M21 23 Q27 19 36 23 Q45 27 51 23" stroke="#C8921E" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.45"/>
  </svg>
 
  <div class="logo">Brew <em>&</em> Audit</div>
  <div class="tagline">Pour your problems in. Walk out with answers.</div>
  <div class="rule"></div>
 
  <label class="klabel">What's your first name?</label>
  <input type="text" class="kinput" id="userName" placeholder="e.g. Sarah, James, Alex…" autocomplete="given-name" maxlength="40"
    onkeydown="if(event.key==='Enter') startSession()">
  <button class="begin" onclick="startSession()">Begin Session ☕</button>
 
  <p class="wfoot">Free to use &nbsp;·&nbsp; No sign-up &nbsp;·&nbsp; Nothing stored</p>
</div>
 
<!-- CHAT -->
<div id="chat">
  <header class="hdr">
    <span class="hdr-logo">Brew &amp; Audit</span>
    <span class="stage-tag" id="stageTag">Getting Started</span>
  </header>
  <div id="msgs"></div>
  <div id="act"></div>
  <div id="inp">
    <textarea id="ui" rows="1" placeholder="Tell Sage what's going on…" onkeydown="onKey(event)" oninput="grow(this)"></textarea>
    <button class="sndbtn" id="sndbtn" onclick="send()">
      <svg width="17" height="17" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="powered"> &nbsp;&nbsp; Brew &amp; Audit</div>
</div>
 
<script>
/* ── STATE ── */
let USER = '';
let STAGE = 'idle';
let HIST = [];
let AUDIT_TXT = '';
let BUSY = false;

/* ── PROMPTS ── */
const SAGE = `You are Sage — a sharp, senior-level AI business auditor. You have the brain of a management consultant, the tongue of a trusted friend, and just the right touch of professionalism. You help founders and operators diagnose exactly what is breaking in their operations and design agentic AI solutions to fix it.

You specialise in identifying manual workflows that can be replaced by AI agents — specific, technical, real automation. Not generic advice. Not "assign someone to manage this." Actual agent architectures: API integrations, classifier pipelines, automated resolution workflows.

---

YOUR CONVERSATION FLOW:

PHASE 1 — CLARIFYING QUESTIONS
When a user first describes their business problem, ask 3–5 sharp clarifying questions. Send them all in one message. Make them feel like you've already spotted the wound and you're just confirming the depth. Ask about: volume and scale, current manual steps, tools already in use, where time or money is actually bleeding.

PHASE 2 — SUMMARY
When the user says they have shared everything, summarise what you have understood in 3–4 clean sentences. Confirm the core problem, the scale of it, and the tools they mentioned. End with: "Does this capture it correctly, or is there anything to add?"

PHASE 3 — THE FULL AUDIT
This is your signature output. Use this exact structure every single time:

**[Business Type] — Operational Audit by Sage**

**The Diagnosis**
2–3 sentences. What is fundamentally broken and why. Name the real problem, not the symptoms. Be direct.

**Process Blueprint: Current State → Future State**

| Operational Bottleneck | Current Time & Volume Drain | Agentic Solution (Future State) | Time Reclaimed & Scale Unlocked |
|---|---|---|---|
| [specific bottleneck] | [hours/week or £/month lost] | [named AI agent + specific API integration] | [quantified outcome] |

Always include 3–5 rows. Every agentic solution must name a specific agent (e.g. "Order Triage Agent", "Customer Ops Agent", "Inventory Sync Agent") and a real integration relevant to their business (Shopify API, Stripe webhooks, courier APIs, Zendesk, WooCommerce, etc.). No generic software suggestions.

**Agent Architecture — How It Actually Works**
For the single highest-priority bottleneck, show the data flow in this format:
[Trigger] → [LLM / Classifier] → [Database or API] → [Automated Action]

**Implementation Roadmap**
- **Week 1–2:** [Most urgent, highest ROI — be specific]
- **Week 3–4:** [Second priority — be specific]
- **Month 2:** [Systemic change — be specific]

**The Bottom Line**
One punchy paragraph. What happens if they act on this versus what happens if they don't. Make it feel real and urgent.

---

PHASE 4 — FOLLOW-UP
After the audit, enter free-flowing advisory mode. Answer questions with the same sharpness. Stay in Sage's voice — warm, precise, never generic.

---

RULES YOU NEVER BREAK:
- Never say "assign someone to research tools" or "build a knowledge base" as standalone advice
- Always frame solutions as named agents with specific integrations
- TECH STACK RULE: Only suggest integrations and platforms the user explicitly mentioned. If they said Shopify, use Shopify API. If they said Gmail, use Gmail. Never invent adjacent tools (e.g. do NOT suggest WooCommerce if they said Shopify, do NOT suggest Zendesk if they did not mention it). Ruthlessly match their actual stack.
- METRICS RULE: Frame all ROI and cost metrics in time and volume — not invented currency figures. Use "4 hours/day eliminated" or "80% of manual queue automated" not "saves £800/month" unless the user gave you actual cost data. Time and volume metrics are more credible and cannot be challenged.
- The Process Blueprint table MUST appear in every full audit
- No filler. No fluff. Every sentence earns its place.`;
const P = {
  clarify:   SAGE,
  summarize: SAGE,
  audit:     SAGE,
  followup:  SAGE
};

/* ── START ── */
function startSession() {
  const name = document.getElementById('userName').value.trim();
  if (!name) { toast('Just your first name is all we need ☕'); return; }
  USER = name.charAt(0).toUpperCase() + name.slice(1);

  document.getElementById('welcome').classList.add('out');
  document.getElementById('chat').classList.add('in');

  STAGE = 'collecting';
  stag('Tell Sage Everything');

  const intro = `Hey ${USER}! Welcome to Brew & Audit. ☕

I'm Sage — think of me as that smart friend who genuinely knows business operations and where AI can actually move the needle. No buzzwords, no fluff.

Tell me what's going on. What's the problem? What's stopping the business from getting where you want it to be? The more honestly you describe it, the sharper your audit will be.

Pour it all out — I'm listening.`;
  addMsg('sage', intro);
  setTimeout(() => document.getElementById('ui').focus(), 600);
}

/* ── SEND ── */
function send() {
  const el = document.getElementById('ui');
  const txt = el.value.trim();
  if (!txt || BUSY) return;
  el.value = ''; el.style.height = '46px';

  if (STAGE === 'collecting') {
    clearAct();
    callSage(txt, P.clarify, 'clarifying');
  } else if (STAGE === 'clarifying') {
    HIST.push({ role: 'user', content: txt });
    addMsg('user', txt);
    const ack = 'Got it — thanks for sharing that.';
    HIST.push({ role: 'assistant', content: ack });
    const a = document.createElement('div');
    a.className = 'ack'; a.textContent = '✦ Sage noted that';
    document.getElementById('msgs').appendChild(a); scroll();
    showAct([
      { l: "I've shared everything →", c: 'prim', fn: 'readyForSummary()' },
      { l: '☕ Brew My Audit', c: 'sec', fn: 'brewAudit()' }
    ]);
  } else if (STAGE === 'followup') {
    callSage(txt, P.followup, 'followup');
  }
}

/* ── ACTIONS ── */
function readyForSummary() {
  clearAct();
  const t = "I've shared everything — please summarise what you know about my situation.";
  HIST.push({ role: 'user', content: t });
  addMsg('user', t);
  callSage(null, P.summarize, 'confirming');
}

function brewAudit() {
  clearAct();
  const t = "Yes, that captures it perfectly. Please give me the full audit.";
  HIST.push({ role: 'user', content: t });
  addMsg('user', t);
  const act = document.getElementById('act');
  act.classList.add('show');
  act.innerHTML = `<div class="brewing"><div class="bbars"><div class="bbar"></div><div class="bbar"></div><div class="bbar"></div><div class="bbar"></div><div class="bbar"></div></div><div class="btxt">Sage is brewing your audit…</div><div class="bsub">Reading between the lines</div></div>`;
  callSage(null, P.audit, 'audit');
}

function addMore() {
  clearAct(); STAGE = 'clarifying'; stag('Adding More');
  document.getElementById('ui').placeholder = 'What else would you like to add?';
  document.getElementById('ui').focus();
}

function startFollowup() {
  STAGE = 'followup'; stag('Follow-up Chat');
  document.getElementById('inp').classList.remove('hidden');
  document.getElementById('ui').placeholder = `Ask Sage anything, ${USER}…`;
  showAct([{ l: '⬇ Download PDF', c: 'sec', fn: 'dlPDF()' }]);
  const ft = `What would you like to dig into further, ${USER}? I'm here. ☕`;
  addMsg('sage', ft);
  HIST.push({ role: 'assistant', content: ft });
}

/* ── API ── */
async function callSage(userMsg, sys, nextStage) {
  if (userMsg) { HIST.push({ role: 'user', content: userMsg }); addMsg('user', userMsg); }
  BUSY = true; setBtn(true);
  const typ = addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: HIST, system: sys })
    });

    const data = await res.json();

    if (!res.ok) {
      if (res.status === 429) throw new Error('Sage is taking a short break — try again in a moment ☕');
      throw new Error(data?.error?.message || `Server error ${res.status}`);
    }

    const text = data?.content?.[0]?.text || '';
    if (!text) throw new Error('Empty response from Sage. Please try again.');

    typ.remove();
    HIST.push({ role: 'assistant', content: text });
    addMsg('sage', text);
    clearAct();
    onDone(text, nextStage);

  } catch(err) {
    typ?.remove();
    clearAct();
    toast(err.message || 'Something went wrong. Please try again.');
  } finally {
    BUSY = false; setBtn(false);
  }
}

/* ── STAGE TRANSITIONS ── */
function onDone(txt, nextStage) {
  STAGE = nextStage;
  if (nextStage === 'clarifying') {
    stag('Clarifying Questions');
    document.getElementById('ui').placeholder = 'Answer here, or add more detail…';
    showAct([{ l: "I've shared everything →", c: 'prim', fn: 'readyForSummary()' }]);
  } else if (nextStage === 'confirming') {
    stag('Almost There');
    showAct([
      { l: '☕ Brew My Audit', c: 'prim', fn: 'brewAudit()' },
      { l: 'Add something first', c: 'sec', fn: 'addMore()' }
    ]);
  } else if (nextStage === 'audit') {
    AUDIT_TXT = txt;
    stag('Your Audit');
    STAGE = 'followup';
    document.getElementById('ui').placeholder = 'Keep chatting with Sage — ask anything…';
    showAct([
      { l: '⬇ Download PDF', c: 'sec', fn: 'dlPDF()' },
      { l: '💬 Ask Sage More', c: 'prim', fn: 'focusInput()' }
    ]);
    setTimeout(() => {
      const inv = `What would you like to dig into, ${USER}? I\'m here. ☕`;
      addMsg('sage', inv);
      HIST.push({ role: 'assistant', content: inv });
    }, 600);
  } else if (nextStage === 'followup') {
    stag('Chatting with Sage');
    showAct([
      { l: '⬇ Download PDF', c: 'sec', fn: 'dlPDF()' },
      { l: '💬 Ask Sage More', c: 'prim', fn: 'focusInput()' }
    ]);
  }
}

/* ── PDF ── */
function dlPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, M = 22, TW = W - M * 2;
  let y = 0;
  const chk = (h) => { if (y + h > 275) { doc.addPage(); y = 20; } };

  const clean = (txt) => {
    if (!txt) return '';
    return txt
      .replace(/\|.*\|/g, '')
      .replace(/[-|]+/g, '')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/^\* /gm, '• ')
      .replace(/^\- /gm, '• ')
      .replace(/^#{1,3} /gm, '')
      .replace(/[^\x20-\x7E\n\r]/g, '')
      .trim();
  };

  doc.setFillColor(10, 5, 0);
  doc.rect(0, 0, W, 46, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(24);
  doc.setTextColor(212, 168, 67);
  doc.text('Brew & Audit', M, 23);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
  doc.setTextColor(140, 108, 68);
  const dt = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  doc.text('Business Audit Report for ' + USER + '  -  ' + dt, M, 34);

  y = 60;

  const sec = (title, content) => {
    if (!content) return;
    chk(14);
    doc.setFillColor(242, 218, 148);
    doc.roundedRect(M - 3, y - 5.5, TW + 6, 9, 2, 2, 'F');
    doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5);
    doc.setTextColor(85, 48, 0); doc.text(title, M, y); y += 10;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    doc.setTextColor(22, 12, 3);
    for (const line of doc.splitTextToSize(clean(content), TW)) {
      chk(6); doc.text(line, M, y); y += 5.5;
    }
    y += 8;
  };

  const fu = HIST.find(m => m.role === 'user');
  if (fu) sec('BUSINESS SITUATION', fu.content);
  if (AUDIT_TXT) sec('YOUR AUDIT', AUDIT_TXT);

  let ai = -1;
  for (let i = HIST.length - 1; i >= 0; i--) { if (HIST[i].content === AUDIT_TXT) { ai = i; break; } }
  if (ai >= 0) {
    const lines = [];
    for (let i = ai + 1; i < HIST.length; i++) {
      const m = HIST[i];
      if (m.content.includes('What would you like to dig into')) continue;
      lines.push((m.role === 'user' ? USER + ': ' : 'Sage: ') + m.content);
    }
    if (lines.length) sec('FOLLOW-UP NOTES', lines.join('\n\n'));
  }

  const pages = doc.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i); doc.setFontSize(7.5); doc.setTextColor(130, 100, 60);
    doc.text('Brew & Audit  -  brewed with AI', M, 290);
    doc.text(i + ' / ' + pages, W - M, 290, { align: 'right' });
  }

  doc.save('brew-audit-' + USER.toLowerCase() + '-' + Date.now() + '.pdf');
}

/* ── UI HELPERS ── */
function addMsg(role, content) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = `<div class="msg-who">${role === 'sage' ? '✦ Sage' : USER || 'You'}</div><div class="msg-bub"></div>`;
  const bub = el.querySelector('.msg-bub');
  if (role === 'sage') {
    bub.innerHTML = marked.parse(content);
  } else {
    bub.textContent = content;
  }
  document.getElementById('msgs').appendChild(el);
  scroll(); return el;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
  document.getElementById('msgs').appendChild(el);
  scroll(); return el;
}

function showAct(btns) {
  const a = document.getElementById('act');
  a.innerHTML = btns.map(b => `<button class="abtn ${b.c}" onclick="${b.fn}">${b.l}</button>`).join('');
  a.classList.add('show');
}

function clearAct() { const a = document.getElementById('act'); a.innerHTML = ''; a.classList.remove('show'); }
function stag(t) { document.getElementById('stageTag').textContent = t; }
function scroll() { const m = document.getElementById('msgs'); m.scrollTop = m.scrollHeight; }
function setBtn(d) { document.getElementById('sndbtn').disabled = d; }
function grow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 130) + 'px'; }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function focusInput() { const el = document.getElementById('ui'); el.focus(); el.scrollIntoView({ behavior: 'smooth' }); }

function toast(msg) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4800);
}
</script>
